<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Losowanie Gracza</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html {
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            overscroll-behavior: none;
            background-color: #000000;
            touch-action: none;
        }

        #glass-box {
            position: absolute;
            top: max(env(safe-area-inset-top), 8px);
            bottom: max(env(safe-area-inset-bottom), 8px);
            left: max(env(safe-area-inset-left), 8px);
            right: max(env(safe-area-inset-right), 8px);
            border-radius: 32px;
            background: rgba(10, 10, 12, 0.6); /* Mocno przyciemnione szkło */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: translateZ(0);
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            mask-image: radial-gradient(white, black);
        }

        /* NOWOŚĆ: CZARNY RDZEŃ EKRANU. Tło w centrum jest czarne, kolory widać tylko na brzegach! */
        .dark-core {
            position: absolute;
            inset: 0;
            background: #000000;
            /* Maska wycina brzegi: 100% czerni w środku, gładko przechodzi w przezroczystość na krawędziach */
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 65%, rgba(0,0,0,0.1) 90%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 65%, rgba(0,0,0,0.1) 90%, rgba(0,0,0,0) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .glass-edge-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.08);
            z-index: 1000;
            mix-blend-mode: overlay; 
        }

        /* KOLORY TŁA: Zwiększona widoczność, ale ukryte pod czarnym rdzeniem (widać je tylko na brzegach) */
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px); 
            opacity: 0.7; /* Wzmocnione, żeby ładnie przebijały na bokach */
            z-index: 0;
            pointer-events: none;
            animation: float 10s infinite alternate ease-in-out; /* Bardzo zwolnione */
        }

        .glow-1 { top: -10%; left: -10%; width: 60%; height: 60%; background: #FF007F; animation-delay: 0s; }
        .glow-2 { bottom: -15%; right: -10%; width: 70%; height: 70%; background: #00FFF0; animation-delay: -3s; }
        .glow-3 { top: 30%; left: 60%; width: 60%; height: 60%; background: #7B2CBF; animation-delay: -6s; }

        @keyframes float {
            0% { transform: scale(0.8) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.3) translate(5%, -5%); opacity: 0.7; }
            100% { transform: scale(0.9) translate(-5%, 5%); opacity: 0.4; }
        }

        /* MGŁA GRACZY */
        .finger-fog {
            position: absolute;
            width: 350px; 
            height: 350px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle closest-side, rgba(var(--glow-rgb), 0.85) 0%, rgba(var(--glow-rgb), 0.25) 45%, rgba(var(--glow-rgb), 0) 80%);
            mix-blend-mode: screen;
            transform: translate(-50%, -50%) scale(0);
            transition: opacity 0.4s ease, transform 0.6s ease-out; /* Wydłużone pojawianie */
            z-index: 10;
        }

        .finger-fog.idle {
            transform: translate(-50%, -50%) scale(0.6);
            opacity: 0.6;
            animation: breathe 2.5s infinite alternate ease-in-out; /* Dużo spokojniejsze oddychanie */
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
        }

        .finger-fog.stage-1 { animation: pulse-s1 1.5s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulse-s1 {
            0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.9; }
        }

        .finger-fog.stage-2 { animation: pulse-s2 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulse-s2 {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .finger-fog.stage-3 { animation: pulse-s3 0.5s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulse-s3 {
            0% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; filter: brightness(1); }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; filter: brightness(1.5); }
        }

        /* EPOKA ZWYCIĘZCY: Czas pojawiania się wydłużony do 3 sekund, a oddech aż do 5 sekund */
        .finger-fog.winner {
            background: radial-gradient(circle closest-side, rgba(255,255,255,0.95) 0%, rgba(var(--glow-rgb), 0.9) 20%, rgba(var(--glow-rgb), 0.3) 50%, rgba(var(--glow-rgb), 0) 80%) !important;
            opacity: 1;
            z-index: 100;
            animation: 
                peaceful-reveal 3s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                peaceful-breathe 5s ease-in-out 3s infinite alternate !important;
        }

        @keyframes peaceful-reveal {
            0% { transform: translate(-50%, -50%) scale(1.4); filter: brightness(1) blur(5px); }
            50% { filter: brightness(1.2) blur(0px); }
            100% { transform: translate(-50%, -50%) scale(2.8); filter: brightness(1.5); }
        }

        @keyframes peaceful-breathe {
            0% { transform: translate(-50%, -50%) scale(2.8); filter: brightness(1.5); }
            100% { transform: translate(-50%, -50%) scale(3.1); filter: brightness(1.9); }
        }

        /* ROZPROSZENIE ZWYKŁEGO GRACZA (3 sekundy) */
        .finger-fog.dispersing {
            animation: evaporate 3s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
        }

        /* ROZPROSZENIE ZWYCIĘZCY (Potężne 4 sekundy, łagodny zjazd z rozmiaru 2.8x) */
        .finger-fog.winner.dispersing {
            animation: evaporate-winner 4s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
        }

        @keyframes evaporate {
            0% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; filter: blur(5px) brightness(1.2); }
            40% { transform: translate(-50%, -50%) scale(3); opacity: 0.4; filter: blur(30px) brightness(0.8); }
            100% { transform: translate(-50%, -50%) scale(6); opacity: 0; filter: blur(80px) brightness(0.1); }
        }

        @keyframes evaporate-winner {
            0% { transform: translate(-50%, -50%) scale(2.8); opacity: 1; filter: blur(0px) brightness(1.5); }
            40% { transform: translate(-50%, -50%) scale(4.5); opacity: 0.6; filter: blur(40px) brightness(1); }
            100% { transform: translate(-50%, -50%) scale(8); opacity: 0; filter: blur(100px) brightness(0.1); }
        }
    </style>
</head>
<body>

    <div id="glass-box">
        <div class="ambient-glow glow-1"></div>
        <div class="ambient-glow glow-2"></div>
        <div class="ambient-glow glow-3"></div>
        
        <div class="dark-core"></div>
        
        <div id="game-canvas" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5;"></div>
        
        <div class="glass-edge-overlay"></div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const glassBox = document.getElementById('glass-box');
        
        let activeTouches = {};
        let countdownTimer = null;
        let isFinished = false;
        let winnerId = null;
        let currentStage = 0;

        const colorsRGB = [
            '0, 255, 240',   
            '255, 0, 127',   
            '123, 44, 191',  
            '57, 255, 20',   
            '255, 107, 0',   
            '255, 215, 0',   
            '0, 229, 255'    
        ];

        function getRelativePos(clientX, clientY) {
            const rect = glassBox.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function render() {
            const existingFogs = document.querySelectorAll('.finger-fog');
            existingFogs.forEach(fog => {
                if (!activeTouches[fog.id] && fog.id !== winnerId) {
                    if (!fog.classList.contains('dispersing')) {
                        // FIX: Używamy classList.add, żeby nie usunąć informacji czy to był .winner!
                        fog.classList.add('dispersing');
                        // Czekamy bezpieczne 4 sekundy na całkowity koniec animacji przed usunięciem HTMLa
                        setTimeout(() => fog.remove(), 4000); 
                    }
                }
            });

            if (isFinished) return;

            Object.keys(activeTouches).forEach(id => {
                let fog = document.getElementById(id);
                if (!fog) {
                    fog = document.createElement('div');
                    fog.className = 'finger-fog idle';
                    fog.id = id;
                    fog.style.setProperty('--glow-rgb', activeTouches[id].colorRGB);
                    canvas.appendChild(fog);
                }
                fog.style.left = activeTouches[id].x + 'px';
                fog.style.top = activeTouches[id].y + 'px';
            });
        }

        function startCountdown() {
            stopCountdown();
            currentStage = 1;
            applyStageClasses();
            
            countdownTimer = setInterval(() => {
                currentStage++;
                if (currentStage <= 3) {
                    applyStageClasses();
                } else {
                    stopCountdown();
                    drawWinner();
                }
            }, 1000);
        }

        function stopCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            currentStage = 0;
            if (!isFinished) {
                const fogs = document.querySelectorAll('.finger-fog');
                fogs.forEach(fog => {
                    if (!fog.classList.contains('dispersing')) {
                        fog.className = 'finger-fog idle';
                    }
                });
            }
        }

        function applyStageClasses() {
            const fogs = document.querySelectorAll('.finger-fog');
            fogs.forEach(fog => {
                if (fog.id !== winnerId && !fog.classList.contains('dispersing')) {
                    fog.className = `finger-fog stage-${currentStage}`;
                }
            });
            if (navigator.vibrate) navigator.vibrate(20);
        }

        function drawWinner() {
            const ids = Object.keys(activeTouches);
            if (ids.length < 2) return;

            isFinished = true;
            const randomIndex = Math.floor(Math.random() * ids.length);
            winnerId = ids[randomIndex];

            const fogs = document.querySelectorAll('.finger-fog');
            fogs.forEach(fog => {
                if (fog.id !== winnerId) {
                    if (!fog.classList.contains('dispersing')) {
                        fog.classList.add('dispersing');
                        setTimeout(() => fog.remove(), 4000);
                    }
                } else {
                    fog.classList.remove('idle', 'stage-1', 'stage-2', 'stage-3');
                    fog.classList.add('winner');
                    if (navigator.vibrate) navigator.vibrate([400]); // Długa, wzniosła wibracja
                }
            });
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (isFinished) return;

            let anyNewFinger = false;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (!activeTouches[touch.identifier]) {
                    const chosenColor = colorsRGB[Math.abs(touch.identifier) % colorsRGB.length];
                    const pos = getRelativePos(touch.clientX, touch.clientY);
                    
                    activeTouches[touch.identifier] = {
                        x: pos.x,
                        y: pos.y,
                        colorRGB: chosenColor
                    };
                    anyNewFinger = true;
                }
            }
            
            render();

            if (Object.keys(activeTouches).length >= 2 && anyNewFinger) {
                startCountdown();
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (isFinished) return;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (activeTouches[touch.identifier]) {
                    const pos = getRelativePos(touch.clientX, touch.clientY);
                    activeTouches[touch.identifier].x = pos.x;
                    activeTouches[touch.identifier].y = pos.y;
                }
            }
            render();
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                delete activeTouches[touch.identifier];
            }

            const remainingCount = Object.keys(activeTouches).length;

            if (remainingCount === 0) {
                isFinished = false;
                winnerId = null;
                activeTouches = {};
                stopCountdown();
            } else if (remainingCount < 2 && !isFinished) {
                stopCountdown();
            }

            render();
        }

        document.addEventListener('touchstart', handleTouchStart, { passive: false });
        document.addEventListener('touchmove', handleTouchMove, { passive: false });
        document.addEventListener('touchend', handleTouchEnd, { passive: false });
        document.addEventListener('touchcancel', handleTouchEnd, { passive: false });
    </script>
</body>
</html>
