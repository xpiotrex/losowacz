<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Finger Selector</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100dvh; position: fixed; background-color: #000; overflow: hidden; touch-action: none; font-family: -apple-system, sans-serif; }

        /* Perfekcyjne wycięcie ramki */
        .viewport {
            position: absolute;
            inset: 12px;
            border-radius: 48px;
            clip-path: inset(0 0 0 0 round 48px); /* Fizyczne wycięcie wszystkich warstw */
            background: #000;
        }

        #layer-ambient, #layer-canvas { position: absolute; inset: 0; }
        
        .ambient-glow { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.8; animation: float 10s infinite alternate ease-in-out; }
        .glow-1 { top: -20%; left: -20%; width: 70%; height: 70%; background: #4183FF; }
        .glow-2 { bottom: -20%; right: -20%; width: 80%; height: 80%; background: #FF007F; }

        @keyframes float { 0% { transform: translate(-5%, -5%); } 100% { transform: translate(5%, 5%); } }

        /* Płynna ramka */
        .border-glow {
            position: absolute; inset: 0;
            background: conic-gradient(from 0deg, #00FFF0 0%, #7B2CBF 33%, #FF007F 66%, #00FFF0 100%);
            filter: blur(40px);
            animation: spin 8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .finger-fog {
            position: absolute; width: 300px; height: 300px;
            pointer-events: none; z-index: 10;
            transform: translate(-50%, -50%) scale(0.1);
            opacity: 0;
            transition: transform 0.4s ease-out, opacity 0.4s ease;
        }
        .fog-visual {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle closest-side, rgba(var(--glow-rgb), 0.8) 0%, rgba(0,0,0,0) 80%);
            mix-blend-mode: screen;
        }

        /* EFEKT ROZLANIA KOLORU ZWYCIĘZCY */
        .flood-effect {
            position: absolute; inset: 0; z-index: 20;
            background: rgba(var(--winner-rgb), 0.8);
            opacity: 0; pointer-events: none;
            transition: opacity 2s ease;
        }

        #install-btn {
            position: absolute; bottom: 40px; right: 40px;
            background: none; border: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="viewport">
        <div id="layer-ambient">
            <div class="ambient-glow glow-1"></div>
            <div class="ambient-glow glow-2"></div>
        </div>
        <div class="border-glow"></div>
        <div id="layer-canvas"></div>
        <div id="flood-layer" class="flood-effect"></div>
    </div>

    <button id="install-btn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 L12 20 M5 13 L12 20 L19 13"/></svg>
    </button>

    <script>
        const canvas = document.getElementById('layer-canvas');
        const flood = document.getElementById('flood-layer');
        let activeTouches = {};
        let winnerId = null;

        function render() {
            Object.keys(activeTouches).forEach(id => {
                let fog = document.getElementById(`t-${id}`);
                if (!fog) {
                    fog = document.createElement('div');
                    fog.id = `t-${id}`;
                    fog.className = 'finger-fog';
                    fog.style.setProperty('--glow-rgb', activeTouches[id].color);
                    fog.innerHTML = '<div class="fog-visual"></div>';
                    canvas.appendChild(fog);
                }
                fog.style.left = activeTouches[id].x + 'px';
                fog.style.top = activeTouches[id].y + 'px';
                fog.style.transform = 'translate(-50%, -50%) scale(1)';
                fog.style.opacity = '1';
            });
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) {
                activeTouches[t.identifier] = { 
                    x: t.clientX - 12, y: t.clientY - 12, 
                    color: [0, 255, 240, 255, 0, 127, 123, 44, 191][t.identifier % 3 * 3] + ',' + [255, 107, 0, 255, 215, 0][t.identifier % 2 * 3] // uproszczone
                };
            }
            render();
            if (Object.keys(activeTouches).length >= 2 && !winnerId) {
                setTimeout(() => {
                    const ids = Object.keys(activeTouches);
                    winnerId = ids[Math.floor(Math.random() * ids.length)];
                    flood.style.setProperty('--winner-rgb', activeTouches[winnerId].color);
                    flood.style.opacity = '1';
                }, 2000);
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) {
                if (activeTouches[t.identifier]) {
                    activeTouches[t.identifier].x = t.clientX - 12;
                    activeTouches[t.identifier].y = t.clientY - 12;
                }
            }
            render();
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) delete activeTouches[t.identifier];
            document.querySelectorAll('.finger-fog').forEach(f => f.style.opacity = '0');
            if (Object.keys(activeTouches).length === 0) {
                winnerId = null;
                flood.style.opacity = '0';
            }
        });
    </script>
</body>
</html>
