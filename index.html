<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png"> <title>Losowanie Gracza</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html {
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000000;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .layer {
            position: absolute;
            top: max(env(safe-area-inset-top), 12px);
            bottom: max(env(safe-area-inset-bottom), 12px);
            left: max(env(safe-area-inset-left), 12px);
            right: max(env(safe-area-inset-right), 12px);
            border-radius: 36px;
            pointer-events: none; 
        }

        /* WARSTWA 1: Tło ambientowe */
        #layer-ambient { overflow: hidden; }
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px); 
            opacity: 0.75; 
            animation: float 10s infinite alternate ease-in-out;
        }
        .glow-1 { top: -10%; left: -10%; width: 60%; height: 60%; background: #FF007F; animation-delay: 0s; }
        .glow-2 { bottom: -15%; right: -10%; width: 70%; height: 70%; background: #00FFF0; animation-delay: -3s; }
        .glow-3 { top: 30%; left: 60%; width: 60%; height: 60%; background: #7B2CBF; animation-delay: -6s; }

        @keyframes float {
            0% { transform: scale(0.8) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.3) translate(5%, -5%); opacity: 0.8; }
            100% { transform: scale(0.9) translate(-5%, 5%); opacity: 0.4; }
        }

        /* WARSTWA 2: Szkło */
        #layer-glass {
            background: rgba(12, 12, 15, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        /* WARSTWA 3: Czarny rdzeń */
        #layer-dark-core {
            background: radial-gradient(ellipse at center, rgba(0,0,0,1) 50%, rgba(0,0,0,0.4) 80%, rgba(0,0,0,0) 100%);
        }

        /* WARSTWA 4: Animowana ramka obrysowa - POPRAWIONA (Tajemnicza i pozbawiona bugów) */
        #layer-border {
            padding: 2px; 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            overflow: hidden;
        }
        .rotating-gradient {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            /* Zwiększona paleta kolorów, płynniejsze przejścia */
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(0, 255, 240, 0.9) 15%,
                rgba(123, 44, 191, 0.9) 30%,
                rgba(255, 0, 127, 0.9) 50%,
                rgba(255, 215, 0, 0.9) 70%,
                transparent 85%
            );
            /* Ten blur sprawia, że krawędź nie ma graficznych "schodków" w Safari i wygląda jak tajemniczy neon */
            filter: blur(6px); 
            /* Spowolniona animacja dla bardziej relaksującego efektu */
            animation: spin-border 6s linear infinite;
        }
        @keyframes spin-border { 100% { transform: rotate(360deg); } }

        /* WARSTWA 5: Szklana krawędź boczna */
        #layer-glass-edge {
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.05);
        }

        /* WARSTWA 6: Pole gry */
        #layer-canvas {
            pointer-events: auto; 
            overflow: hidden; 
            transform: translateZ(0); 
        }

        /* BAZA MGŁY PALCÓW */
        .finger-fog {
            position: absolute;
            width: 350px; height: 350px;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%) scale(0.1);
            opacity: 0; filter: brightness(1) blur(0px);
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease, filter 0.6s ease;
        }

        .fog-visual {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle closest-side, rgba(var(--glow-rgb), 0.9) 0%, rgba(var(--glow-rgb), 0.25) 45%, rgba(0,0,0,0) 80%);
            mix-blend-mode: screen;
            animation: subtle-breathe 1.5s infinite alternate ease-in-out;
        }
        @keyframes subtle-breathe { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }

        .finger-fog.idle { transform: translate(-50%, -50%) scale(0.6); opacity: 0.6; }
        .finger-fog.stage-1 { transform: translate(-50%, -50%) scale(0.8); opacity: 0.7; }
        .finger-fog.stage-2 { transform: translate(-50%, -50%) scale(1.0); opacity: 0.9; }
        .finger-fog.stage-3 { transform: translate(-50%, -50%) scale(1.2); opacity: 1; filter: brightness(1.2); }

        .finger-fog.winner {
            transform: translate(-50%, -50%) scale(2.8);
            opacity: 1; filter: brightness(1.6); z-index: 100;
            transition: transform 3s cubic-bezier(0.25, 1, 0.5, 1), opacity 3s ease, filter 3s ease;
        }
        .finger-fog.winner .fog-visual {
            background: radial-gradient(circle closest-side, rgba(255,255,255,0.95) 0%, rgba(var(--glow-rgb), 0.9) 20%, rgba(var(--glow-rgb), 0.2) 50%, rgba(0,0,0,0) 80%);
            animation: winner-breathe 4s infinite alternate ease-in-out;
        }
        @keyframes winner-breathe { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }

        .finger-fog.dispersing {
            transform: translate(-50%, -50%) scale(2.5) !important;
            opacity: 0 !important; filter: brightness(0.5) blur(30px) !important;
            transition: transform 2s ease-out, opacity 1.5s ease 0.5s, filter 2s ease !important;
        }

        .finger-fog.winner.dispersing {
            transform: translate(-50%, -50%) scale(15) !important; 
            opacity: 0 !important; filter: brightness(2.5) blur(30px) !important;
            transition: transform 1.5s cubic-bezier(0.5, 0, 0.8, 1), filter 3.5s ease, opacity 3.5s ease-in-out 1s !important; 
        }

        /* --- UI: PRZYCISK INSTALACJI I MODAL --- */
        #install-btn {
            position: absolute;
            bottom: max(env(safe-area-inset-bottom), 30px);
            right: max(env(safe-area-inset-right), 30px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            z-index: 200; /* Nad ekranem gry */
            display: none; /* Domyślnie ukryte, pokazywane przez JS w Safari */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: background 0.2s, color 0.2s;
        }
        #install-btn:active { background: rgba(255, 255, 255, 0.2); color: #fff; }

        #install-modal {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #install-modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: rgba(25, 25, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 80%;
            max-width: 320px;
            text-align: center;
            color: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #install-modal.show .modal-content { transform: translateY(0); }
        .modal-content h3 { font-size: 18px; margin-bottom: 15px; font-weight: 600; }
        .modal-content p { font-size: 15px; color: #aaa; line-height: 1.5; margin-bottom: 20px; }
        .modal-content svg { width: 30px; fill: #007AFF; margin: 10px 0; }
        .close-modal {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="layer" id="layer-ambient">
        <div class="ambient-glow glow-1"></div>
        <div class="ambient-glow glow-2"></div>
        <div class="ambient-glow glow-3"></div>
    </div>
    <div class="layer" id="layer-glass"></div>
    <div class="layer" id="layer-dark-core"></div>
    <div class="layer" id="layer-border">
        <div class="rotating-gradient"></div>
    </div>
    <div class="layer" id="layer-glass-edge"></div>

    <div class="layer" id="layer-canvas"></div>

    <button id="install-btn">Zainstaluj Apkę</button>

    <div id="install-modal">
        <div class="modal-content">
            <h3>Zainstaluj na pulpicie</h3>
            <p>Aby gra działała na pełnym ekranie i bez paska adresu:</p>
            <p>1. Kliknij ikonę <b>Udostępnij</b> na dolnym pasku (kwadrat ze strzałką).</p>
            <p>2. Wybierz opcję <br><b>"Do ekranu początkowego"</b></p>
            <button class="close-modal" id="close-modal-btn">Zrozumiałem</button>
        </div>
    </div>

    <script>
        // LOGIKA GRY
        const canvas = document.getElementById('layer-canvas');
        let activeTouches = {};
        let countdownTimer = null;
        let isFinished = false;
        let winnerId = null;
        let currentStage = 0;

        const colorsRGB = [
            '0, 255, 240', '255, 0, 127', '123, 44, 191',  
            '57, 255, 20', '255, 107, 0', '255, 215, 0', '0, 229, 255'    
        ];

        function getRelativePos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function render() {
            const existingFogs = document.querySelectorAll('.finger-fog');
            existingFogs.forEach(fog => {
                const touchId = fog.getAttribute('data-id');
                if (!activeTouches[touchId]) {
                    if (!fog.classList.contains('dispersing')) {
                        fog.classList.add('dispersing');
                        fog.removeAttribute('data-id'); 
                        setTimeout(() => fog.remove(), 4500); 
                    }
                }
            });

            if (isFinished) return;

            Object.keys(activeTouches).forEach(id => {
                let fog = document.getElementById(`touch-${id}`);
                if (!fog) {
                    fog = document.createElement('div');
                    fog.id = `touch-${id}`;
                    fog.className = 'finger-fog';
                    fog.setAttribute('data-id', id);
                    fog.style.setProperty('--glow-rgb', activeTouches[id].colorRGB);
                    
                    const visual = document.createElement('div');
                    visual.className = 'fog-visual';
                    fog.appendChild(visual);
                    canvas.appendChild(fog);
                    
                    void fog.offsetWidth;
                    fog.classList.add('idle');
                }
                fog.style.left = activeTouches[id].x + 'px';
                fog.style.top = activeTouches[id].y + 'px';
            });
        }

        function startCountdown() {
            stopCountdown();
            currentStage = 1;
            applyStageClasses();
            
            countdownTimer = setInterval(() => {
                currentStage++;
                if (currentStage <= 3) {
                    applyStageClasses();
                } else {
                    stopCountdown();
                    drawWinner();
                }
            }, 1000);
        }

        function stopCountdown() {
            if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
            currentStage = 0;
            if (!isFinished) {
                document.querySelectorAll('.finger-fog').forEach(fog => {
                    if (!fog.classList.contains('dispersing')) fog.className = 'finger-fog idle';
                });
            }
        }

        function applyStageClasses() {
            document.querySelectorAll('.finger-fog').forEach(fog => {
                if (fog.getAttribute('data-id') !== winnerId && !fog.classList.contains('dispersing')) {
                    fog.className = `finger-fog stage-${currentStage}`;
                }
            });
            if (navigator.vibrate) navigator.vibrate(20);
        }

        function drawWinner() {
            const ids = Object.keys(activeTouches);
            if (ids.length < 2) return;

            isFinished = true;
            winnerId = ids[Math.floor(Math.random() * ids.length)];

            document.querySelectorAll('.finger-fog').forEach(fog => {
                if (fog.getAttribute('data-id') !== winnerId) {
                    if (!fog.classList.contains('dispersing')) {
                        fog.classList.add('dispersing');
                        fog.removeAttribute('data-id');
                        setTimeout(() => fog.remove(), 4000);
                    }
                } else {
                    fog.className = 'finger-fog winner';
                    if (navigator.vibrate) navigator.vibrate([400]); 
                }
            });
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (isFinished) return;
            let anyNewFinger = false;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchId = String(touch.identifier);
                if (!activeTouches[touchId]) {
                    activeTouches[touchId] = {
                        x: getRelativePos(touch.clientX, touch.clientY).x,
                        y: getRelativePos(touch.clientX, touch.clientY).y,
                        colorRGB: colorsRGB[Math.abs(touch.identifier) % colorsRGB.length]
                    };
                    anyNewFinger = true;
                }
            }
            render();
            if (Object.keys(activeTouches).length >= 2 && anyNewFinger) startCountdown();
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (isFinished) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchId = String(touch.identifier);
                if (activeTouches[touchId]) {
                    activeTouches[touchId].x = getRelativePos(touch.clientX, touch.clientY).x;
                    activeTouches[touchId].y = getRelativePos(touch.clientX, touch.clientY).y;
                }
            }
            render();
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                delete activeTouches[String(e.changedTouches[i].identifier)];
            }
            render();
            const remainingCount = Object.keys(activeTouches).length;
            if (remainingCount === 0) {
                isFinished = false; winnerId = null; activeTouches = {}; stopCountdown();
            } else if (remainingCount < 2 && !isFinished) {
                stopCountdown();
            }
        }

        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

        // LOGIKA INSTALACJI PWA
        const installBtn = document.getElementById('install-btn');
        const installModal = document.getElementById('install-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');

        // Funkcja sprawdzająca czy jesteśmy na iOS i czy apka nie jest jeszcze zainstalowana
        const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        // Pokaż przycisk tylko w Safari (nie w zainstalowanej PWA)
        if (isIos() && !isInStandaloneMode()) {
            installBtn.style.display = 'block';
        }

        // Obsługa kliknięć
        installBtn.addEventListener('click', () => {
            installModal.classList.add('show');
        });
        
        closeModalBtn.addEventListener('click', () => {
            installModal.classList.remove('show');
        });

        // Ukryj modal przy kliknięciu w tło
        installModal.addEventListener('click', (e) => {
            if (e.target === installModal) installModal.classList.remove('show');
        });

    </script>
</body>
</html>
