<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Losowanie Gracza</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html {
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000000;
            overflow: hidden;
            touch-action: none;
        }

        /* ARCHITEKTURA WARSTWOWA (Omija bugi iOS)
           Wszystkie warstwy mają ten sam rozmiar i nakładają się na siebie 
        */
        .layer {
            position: absolute;
            top: max(env(safe-area-inset-top), 12px);
            bottom: max(env(safe-area-inset-bottom), 12px);
            left: max(env(safe-area-inset-left), 12px);
            right: max(env(safe-area-inset-right), 12px);
            border-radius: 36px;
            pointer-events: none; /* Domyślnie przepuszczają dotyk do warstwy Canvas */
        }

        /* WARSTWA 1: Tło ambientowe (Plazma) */
        #layer-ambient {
            overflow: hidden; /* Przycina plazmę do zaokrąglonych rogów */
        }
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px); 
            opacity: 0.75; 
            animation: float 10s infinite alternate ease-in-out;
        }
        .glow-1 { top: -10%; left: -10%; width: 60%; height: 60%; background: #FF007F; animation-delay: 0s; }
        .glow-2 { bottom: -15%; right: -10%; width: 70%; height: 70%; background: #00FFF0; animation-delay: -3s; }
        .glow-3 { top: 30%; left: 60%; width: 60%; height: 60%; background: #7B2CBF; animation-delay: -6s; }

        @keyframes float {
            0% { transform: scale(0.8) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.3) translate(5%, -5%); opacity: 0.8; }
            100% { transform: scale(0.9) translate(-5%, 5%); opacity: 0.4; }
        }

        /* WARSTWA 2: Szkło (Tylko rozmywa to, co pod nim) */
        #layer-glass {
            background: rgba(12, 12, 15, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        /* WARSTWA 3: Czarny rdzeń (Przyciemnia środek ekranu, uwydatnia kolory boków) */
        #layer-dark-core {
            /* Idealny gradient bez użycia maskowania! */
            background: radial-gradient(ellipse at center, rgba(0,0,0,1) 50%, rgba(0,0,0,0.4) 80%, rgba(0,0,0,0) 100%);
        }

        /* WARSTWA 4: Animowana ramka obrysowa */
        #layer-border {
            padding: 2.5px; /* Grubość świetlnej ramki */
            /* Puste wnęrze wycięte maską (wspierane w 100% na Safari) */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            overflow: hidden;
        }
        .rotating-gradient {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(0, 255, 240, 1) 20%,
                rgba(255, 0, 127, 1) 40%,
                transparent 60%
            );
            animation: spin-border 3s linear infinite;
        }
        @keyframes spin-border { 100% { transform: rotate(360deg); } }

        /* WARSTWA 5: Stała, szklana krawędź boczna (nadaje refleks ekranowi) */
        #layer-glass-edge {
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.05);
        }

        /* WARSTWA 6: Pole gry (Łapie dotyk, renderuje mgły graczy) */
        #layer-canvas {
            pointer-events: auto; /* Jako jedyna warstwa łapie dotyk! */
            overflow: hidden; /* Przycina mgły do zaokrąglenia ekranu */
            transform: translateZ(0); /* Wymuszenie przycinania dla Safari */
        }

        /* BAZA MGŁY PALCÓW (Wszystkie zmiany oparte o płynne transitions!) */
        .finger-fog {
            position: absolute;
            width: 350px; height: 350px;
            pointer-events: none;
            z-index: 10;
            
            /* Startowe zmienne (Niewidoczne) */
            transform: translate(-50%, -50%) scale(0.1);
            opacity: 0;
            filter: brightness(1) blur(0px);
            
            /* Przejścia zapewniają miękki powrót w przypadku zabrania palca w trakcie */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.6s ease, 
                        filter 0.6s ease;
        }

        .fog-visual {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle closest-side, rgba(var(--glow-rgb), 0.9) 0%, rgba(var(--glow-rgb), 0.25) 45%, rgba(0,0,0,0) 80%);
            mix-blend-mode: screen;
            animation: subtle-breathe 1.5s infinite alternate ease-in-out;
        }

        @keyframes subtle-breathe {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }

        /* STANY ODLICZANIA */
        .finger-fog.idle { transform: translate(-50%, -50%) scale(0.6); opacity: 0.6; }
        .finger-fog.stage-1 { transform: translate(-50%, -50%) scale(0.8); opacity: 0.7; }
        .finger-fog.stage-2 { transform: translate(-50%, -50%) scale(1.0); opacity: 0.9; }
        .finger-fog.stage-3 { transform: translate(-50%, -50%) scale(1.2); opacity: 1; filter: brightness(1.2); }

        /* NARODZINY ZWYCIĘZCY */
        .finger-fog.winner {
            transform: translate(-50%, -50%) scale(2.8);
            opacity: 1; filter: brightness(1.6); z-index: 100;
            transition: transform 3s cubic-bezier(0.25, 1, 0.5, 1), opacity 3s ease, filter 3s ease;
        }
        .finger-fog.winner .fog-visual {
            background: radial-gradient(circle closest-side, rgba(255,255,255,0.95) 0%, rgba(var(--glow-rgb), 0.9) 20%, rgba(var(--glow-rgb), 0.2) 50%, rgba(0,0,0,0) 80%);
            animation: winner-breathe 4s infinite alternate ease-in-out;
        }
        @keyframes winner-breathe { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }

        /* ROZPROSZENIE (Puszczenie palca przegranego gracza) */
        .finger-fog.dispersing {
            transform: translate(-50%, -50%) scale(2.5) !important;
            opacity: 0 !important; filter: brightness(0.5) blur(30px) !important;
            transition: transform 2s ease-out, opacity 1.5s ease 0.5s, filter 2s ease !important;
        }

        /* POTĘŻNE ZALANIE OKNA (Gdy Zwycięzca puści palec) */
        .finger-fog.winner.dispersing {
            /* Obłok uderza do x15 skali, obejmując absolutnie cały ekran */
            transform: translate(-50%, -50%) scale(15) !important; 
            opacity: 0 !important; filter: brightness(2.5) blur(30px) !important;
            /* Rośnie i gaśnie w iście kinowy sposób */
            transition: transform 1.5s cubic-bezier(0.5, 0, 0.8, 1), 
                        filter 3.5s ease, 
                        opacity 3.5s ease-in-out 1s !important; 
        }
    </style>
</head>
<body>

    <div class="layer" id="layer-ambient">
        <div class="ambient-glow glow-1"></div>
        <div class="ambient-glow glow-2"></div>
        <div class="ambient-glow glow-3"></div>
    </div>
    
    <div class="layer" id="layer-glass"></div>
    <div class="layer" id="layer-dark-core"></div>
    
    <div class="layer" id="layer-border">
        <div class="rotating-gradient"></div>
    </div>
    <div class="layer" id="layer-glass-edge"></div>

    <div class="layer" id="layer-canvas"></div>

    <script>
        const canvas = document.getElementById('layer-canvas');
        
        let activeTouches = {};
        let countdownTimer = null;
        let isFinished = false;
        let winnerId = null;
        let currentStage = 0;

        const colorsRGB = [
            '0, 255, 240',   
            '255, 0, 127',   
            '123, 44, 191',  
            '57, 255, 20',   
            '255, 107, 0',   
            '255, 215, 0',   
            '0, 229, 255'    
        ];

        function getRelativePos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function render() {
            const existingFogs = document.querySelectorAll('.finger-fog');
            existingFogs.forEach(fog => {
                const touchId = fog.getAttribute('data-id');
                if (!activeTouches[touchId]) {
                    if (!fog.classList.contains('dispersing')) {
                        fog.classList.add('dispersing');
                        fog.removeAttribute('data-id'); 
                        setTimeout(() => fog.remove(), 4500); // Czeka, aż wygasną nawet opóźnione efekty
                    }
                }
            });

            if (isFinished) return;

            Object.keys(activeTouches).forEach(id => {
                let fog = document.getElementById(`touch-${id}`);
                if (!fog) {
                    fog = document.createElement('div');
                    fog.id = `touch-${id}`;
                    fog.className = 'finger-fog'; // Na start bez klasy, aby odpalić płynną animację
                    fog.setAttribute('data-id', id);
                    fog.style.setProperty('--glow-rgb', activeTouches[id].colorRGB);
                    
                    const visual = document.createElement('div');
                    visual.className = 'fog-visual';
                    fog.appendChild(visual);
                    
                    canvas.appendChild(fog);
                    
                    // Wymuszenie reflow - konieczne aby przejście (transition) zadziałało z opóźnieniem
                    void fog.offsetWidth;
                    fog.classList.add('idle');
                }
                fog.style.left = activeTouches[id].x + 'px';
                fog.style.top = activeTouches[id].y + 'px';
            });
        }

        function startCountdown() {
            stopCountdown();
            currentStage = 1;
            applyStageClasses();
            
            countdownTimer = setInterval(() => {
                currentStage++;
                if (currentStage <= 3) {
                    applyStageClasses();
                } else {
                    stopCountdown();
                    drawWinner();
                }
            }, 1000);
        }

        function stopCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            currentStage = 0;
            if (!isFinished) {
                const fogs = document.querySelectorAll('.finger-fog');
                fogs.forEach(fog => {
                    if (!fog.classList.contains('dispersing')) {
                        // Cofnięcie klasy do 'idle' - dzięki CSS transition obłok płynnie się kurczy
                        fog.className = 'finger-fog idle';
                    }
                });
            }
        }

        function applyStageClasses() {
            const fogs = document.querySelectorAll('.finger-fog');
            fogs.forEach(fog => {
                if (fog.getAttribute('data-id') !== winnerId && !fog.classList.contains('dispersing')) {
                    fog.className = `finger-fog stage-${currentStage}`;
                }
            });
            if (navigator.vibrate) navigator.vibrate(20);
        }

        function drawWinner() {
            const ids = Object.keys(activeTouches);
            if (ids.length < 2) return;

            isFinished = true;
            const randomIndex = Math.floor(Math.random() * ids.length);
            winnerId = ids[randomIndex];

            const fogs = document.querySelectorAll('.finger-fog');
            fogs.forEach(fog => {
                if (fog.getAttribute('data-id') !== winnerId) {
                    if (!fog.classList.contains('dispersing')) {
                        fog.classList.add('dispersing');
                        fog.removeAttribute('data-id');
                        setTimeout(() => fog.remove(), 4000);
                    }
                } else {
                    fog.className = 'finger-fog winner';
                    if (navigator.vibrate) navigator.vibrate([400]); 
                }
            });
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (isFinished) return;

            let anyNewFinger = false;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchId = String(touch.identifier);
                
                if (!activeTouches[touchId]) {
                    const chosenColor = colorsRGB[Math.abs(touch.identifier) % colorsRGB.length];
                    const pos = getRelativePos(touch.clientX, touch.clientY);
                    
                    activeTouches[touchId] = {
                        x: pos.x,
                        y: pos.y,
                        colorRGB: chosenColor
                    };
                    anyNewFinger = true;
                }
            }
            
            render();

            if (Object.keys(activeTouches).length >= 2 && anyNewFinger) {
                startCountdown();
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (isFinished) return;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchId = String(touch.identifier);
                
                if (activeTouches[touchId]) {
                    const pos = getRelativePos(touch.clientX, touch.clientY);
                    activeTouches[touchId].x = pos.x;
                    activeTouches[touchId].y = pos.y;
                }
            }
            render();
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchId = String(touch.identifier);
                delete activeTouches[touchId];
            }

            render(); // Wymusza nadanie klasy ulatniania się nawet zwycięzcy

            const remainingCount = Object.keys(activeTouches).length;

            if (remainingCount === 0) {
                isFinished = false;
                winnerId = null;
                activeTouches = {};
                stopCountdown();
            } else if (remainingCount < 2 && !isFinished) {
                stopCountdown();
            }
        }

        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
    </script>
</body>
</html>
