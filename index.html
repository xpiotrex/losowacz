<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Losowanie Gracza</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100fvh; /* Wymusza pełną wysokość ekranu na iOS */
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%) !important;
            background-color: #0f0f1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }
        
        /* Wielki licznik w tle */
        #countdown-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.15);
            font-size: 40fvh; /* Uzależniony od wysokości ekranu, aby był ogromny */
            font-weight: 900;
            pointer-events: none;
            z-index: 1;
            transition: transform 0.2s ease-out, color 0.2s ease-out;
            display: none;
        }
        
        /* Animacja pulsowania licznika przy zmianie cyfry */
        .pulse-number {
            animation: number-pop 0.3s ease-out;
            color: rgba(255, 255, 255, 0.4) !important;
        }

        @keyframes number-pop {
            0% { transform: translate(-50%, -50%) scale(0.7); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Okręgi graczy */
        .finger-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            border: 4px solid rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px var(--glow-color), inset 0 0 15px rgba(255,255,255,0.2);
            z-index: 5;
        }
        
        .finger-circle.holding {
            transform: translate(-50%, -50%) scale(1.1);
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite alternate;
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 25px var(--glow-color); }
            100% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 45px var(--glow-color); }
        }

        /* Zwycięzca */
        .finger-circle.winner {
            transform: translate(-50%, -50%) scale(2.5) !important;
            border-color: #ffffff;
            animation: winner-glow 0.6s ease-in-out infinite alternate;
            z-index: 100;
        }

        @keyframes winner-glow {
            0% { box-shadow: 0 0 50px var(--glow-color), 0 0 100px var(--glow-color), inset 0 0 30px rgba(255,255,255,0.6); }
            100% { box-shadow: 0 0 90px var(--glow-color), 0 0 160px var(--glow-color), inset 0 0 50px rgba(255,255,255,0.8); }
        }
    </style>
</head>
<body>

    <div id="countdown-display">3</div>
    <div id="game-canvas" style="width: 100%; height: 100%;"></div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const countdownDisplay = document.getElementById('countdown-display');
        
        let activeTouches = {};
        let countdownTimer = null;
        let isFinished = false;
        let winnerId = null;
        let timeLeft = 3;

        const colors = ['#00FFF0', '#FF007F', '#7B2CBF', '#39FF14', '#FF6B00', '#FFD700', '#00E5FF'];

        function render() {
            // Usuwanie kółek graczy, którzy zabrali palce
            const existingCircles = document.querySelectorAll('.finger-circle');
            existingCircles.forEach(circle => {
                if (!activeTouches[circle.id] && circle.id !== winnerId) {
                    circle.style.transform = 'translate(-50%, -50%) scale(0)';
                    setTimeout(() => circle.remove(), 200);
                }
            });

            if (isFinished) return;

            // Rysowanie/Aktualizacja pozycji aktualnych palców
            Object.keys(activeTouches).forEach(id => {
                let circle = document.getElementById(id);
                if (!circle) {
                    circle = document.createElement('div');
                    circle.className = 'finger-circle';
                    circle.id = id;
                    circle.style.setProperty('--glow-color', activeTouches[id].color);
                    circle.style.backgroundColor = activeTouches[id].color + '40';
                    canvas.appendChild(circle);
                    
                    requestAnimationFrame(() => {
                        if (circle) circle.classList.add('holding');
                    });
                }
                circle.style.left = activeTouches[id].x + 'px';
                circle.style.top = activeTouches[id].y + 'px';
            });

            // Ukrywanie/Pokazywanie licznika w zależności od liczby graczy
            const count = Object.keys(activeTouches).length;
            if (count < 2) {
                stopCountdown();
                countdownDisplay.style.display = 'none';
            }
        }

        function startCountdown() {
            stopCountdown(); // Czyszczenie poprzedniego interwału na wszelki wypadek
            
            timeLeft = 3;
            updateCountdownDisplay();
            countdownDisplay.style.display = 'block';
            
            countdownTimer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    updateCountdownDisplay();
                } else {
                    stopCountdown();
                    drawWinner();
                }
            }, 1000);
        }

        function stopCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        function updateCountdownDisplay() {
            countdownDisplay.innerText = timeLeft;
            // Wymuszenie restartu animacji cyfry
            countdownDisplay.classList.remove('pulse-number');
            void countdownDisplay.offsetWidth; 
            countdownDisplay.classList.add('pulse-number');
        }

        function drawWinner() {
            const ids = Object.keys(activeTouches);
            if (ids.length < 2) return;

            isFinished = true;
            countdownDisplay.style.display = 'none';

            const randomIndex = Math.floor(Math.random() * ids.length);
            winnerId = ids[randomIndex];

            const circles = document.querySelectorAll('.finger-circle');
            circles.forEach(circle => {
                if (circle.id !== winnerId) {
                    circle.style.transform = 'translate(-50%, -50%) scale(0)';
                    setTimeout(() => circle.remove(), 200);
                } else {
                    circle.classList.remove('holding');
                    circle.classList.add('winner');
                    
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            });
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (isFinished) return;

            let anyNewFinger = false;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (!activeTouches[touch.identifier]) {
                    const chosenColor = colors[Math.abs(touch.identifier) % colors.length];
                    activeTouches[touch.identifier] = {
                        x: touch.clientX,
                        y: touch.clientY,
                        color: chosenColor
                    };
                    anyNewFinger = true;
                }
            }
            
            render();

            // Jeżeli jest min. 2 graczy i ktoś właśnie dołożył palec -> Reset i start odliczania od 3
            if (Object.keys(activeTouches).length >= 2 && anyNewFinger) {
                startCountdown();
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (isFinished) return;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (activeTouches[touch.identifier]) {
                    activeTouches[touch.identifier].x = touch.clientX;
                    activeTouches[touch.identifier].y = touch.clientY;
                }
            }
            render();
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                delete activeTouches[touch.identifier];
            }

            // Pełny reset pamięci gry, kiedy na ekranie nie ma już ANI JEDNEGO palca
            if (Object.keys(activeTouches).length === 0) {
                isFinished = false;
                winnerId = null;
                activeTouches = {}; // Dodatkowe czyszczenie obiektu dotknięć
            }

            render();
        }

        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
    </script>
</body>
</html>
