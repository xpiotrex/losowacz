<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Losowanie Gracza</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html {
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            overscroll-behavior: none;
            background-color: #000000;
            touch-action: none;
        }

        #glass-box {
            position: absolute;
            top: max(env(safe-area-inset-top), 8px);
            bottom: max(env(safe-area-inset-bottom), 8px);
            left: max(env(safe-area-inset-left), 8px);
            right: max(env(safe-area-inset-right), 8px);
            border-radius: 32px;
            background: rgba(15, 15, 20, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: translateZ(0);
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            mask-image: radial-gradient(white, black);
        }

        .glass-edge-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
            z-index: 1000;
            mix-blend-mode: overlay; 
        }

        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px); 
            z-index: 0;
            pointer-events: none;
            animation: float 6s infinite alternate ease-in-out;
        }

        .glow-1 { top: -10%; left: -10%; width: 60%; height: 60%; background: #FF007F; animation-delay: 0s; }
        .glow-2 { bottom: -15%; right: -10%; width: 70%; height: 70%; background: #00FFF0; animation-delay: -2s; }
        .glow-3 { top: 30%; left: 50%; width: 60%; height: 60%; background: #7B2CBF; animation-delay: -4s; }

        @keyframes float {
            0% { transform: scale(0.8) translate(0, 0); opacity: 0.15; }
            33% { transform: scale(1.3) translate(10%, -10%); opacity: 0.45; }
            66% { transform: scale(1.5) translate(-10%, 15%); opacity: 0.3; }
            100% { transform: scale(0.9) translate(5%, 5%); opacity: 0.5; }
        }

        .finger-fog {
            position: absolute;
            width: 350px; 
            height: 350px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle closest-side, rgba(var(--glow-rgb), 0.85) 0%, rgba(var(--glow-rgb), 0.25) 45%, rgba(var(--glow-rgb), 0) 80%);
            mix-blend-mode: screen;
            transform: translate(-50%, -50%) scale(0);
            transition: opacity 0.3s ease, transform 0.4s ease-out;
            z-index: 10;
        }

        .finger-fog.idle {
            transform: translate(-50%, -50%) scale(0.6);
            opacity: 0.6;
            animation: breathe 1.5s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
        }

        .finger-fog.stage-1 { animation: pulse-s1 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulse-s1 {
            0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.9; }
        }

        .finger-fog.stage-2 { animation: pulse-s2 0.5s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulse-s2 {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .finger-fog.stage-3 { animation: pulse-s3 0.25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulse-s3 {
            0% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; filter: brightness(1); }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; filter: brightness(1.5); }
        }

        /* SPOKOJNY ZWYCIĘZCA
           Używamy dwóch animacji naraz: 
           1. peaceful-reveal (wejście - powolne rozkwitanie)
           2. peaceful-breathe (stan spoczynku - bardzo łagodne pulsowanie)
        */
        .finger-fog.winner {
            background: radial-gradient(circle closest-side, rgba(255,255,255,0.95) 0%, rgba(var(--glow-rgb), 0.9) 20%, rgba(var(--glow-rgb), 0.3) 50%, rgba(var(--glow-rgb), 0) 80%) !important;
            opacity: 1;
            z-index: 100;
            animation: 
                peaceful-reveal 2s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                peaceful-breathe 4s ease-in-out 2s infinite alternate !important;
        }

        @keyframes peaceful-reveal {
            0% { transform: translate(-50%, -50%) scale(1.4); filter: brightness(1) blur(5px); }
            50% { filter: brightness(1.3) blur(0px); }
            100% { transform: translate(-50%, -50%) scale(2.6); filter: brightness(1.4); }
        }

        @keyframes peaceful-breathe {
            0% { transform: translate(-50%, -50%) scale(2.6); filter: brightness(1.4); }
            100% { transform: translate(-50%, -50%) scale(2.9); filter: brightness(1.8); }
        }

        /* POTĘŻNE, POWOLNE ROZPROSZENIE
           Wydłużone do 2 sekund. Mgła rośnie do 5x swojego rozmiaru, bardzo mocno się rozmywając.
        */
        .finger-fog.dispersing {
            animation: evaporate 2s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
        }

        @keyframes evaporate {
            0% { 
                transform: translate(-50%, -50%) scale(1.2); 
                opacity: 0.8; 
                filter: blur(5px) brightness(1.2); 
            }
            40% {
                transform: translate(-50%, -50%) scale(2.5);
                opacity: 0.4;
                filter: blur(25px) brightness(0.8);
            }
            100% { 
                transform: translate(-50%, -50%) scale(5); 
                opacity: 0; 
                filter: blur(60px) brightness(0.2); 
            }
        }
    </style>
</head>
<body>

    <div id="glass-box">
        <div class="ambient-glow glow-1"></div>
        <div class="ambient-glow glow-2"></div>
        <div class="ambient-glow glow-3"></div>
        
        <div id="game-canvas" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5;"></div>
        <div class="glass-edge-overlay"></div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const glassBox = document.getElementById('glass-box');
        
        let activeTouches = {};
        let countdownTimer = null;
        let isFinished = false;
        let winnerId = null;
        let currentStage = 0;

        const colorsRGB = [
            '0, 255, 240',   
            '255, 0, 127',   
            '123, 44, 191',  
            '57, 255, 20',   
            '255, 107, 0',   
            '255, 215, 0',   
            '0, 229, 255'    
        ];

        function getRelativePos(clientX, clientY) {
            const rect = glassBox.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function render() {
            const existingFogs = document.querySelectorAll('.finger-fog');
            existingFogs.forEach(fog => {
                if (!activeTouches[fog.id] && fog.id !== winnerId) {
                    if (!fog.classList.contains('dispersing')) {
                        fog.className = 'finger-fog dispersing';
                        // Dopasowanie JavaScriptu do nowej, potężnej 2-sekundowej animacji
                        setTimeout(() => fog.remove(), 2000); 
                    }
                }
            });

            if (isFinished) return;

            Object.keys(activeTouches).forEach(id => {
                let fog = document.getElementById(id);
                if (!fog) {
                    fog = document.createElement('div');
                    fog.className = 'finger-fog idle';
                    fog.id = id;
                    fog.style.setProperty('--glow-rgb', activeTouches[id].colorRGB);
                    canvas.appendChild(fog);
                }
                fog.style.left = activeTouches[id].x + 'px';
                fog.style.top = activeTouches[id].y + 'px';
            });
        }

        function startCountdown() {
            stopCountdown();
            currentStage = 1;
            applyStageClasses();
            
            countdownTimer = setInterval(() => {
                currentStage++;
                if (currentStage <= 3) {
                    applyStageClasses();
                } else {
                    stopCountdown();
                    drawWinner();
                }
            }, 1000);
        }

        function stopCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            currentStage = 0;
            if (!isFinished) {
                const fogs = document.querySelectorAll('.finger-fog');
                fogs.forEach(fog => {
                    if (!fog.classList.contains('dispersing')) {
                        fog.className = 'finger-fog idle';
                    }
                });
            }
        }

        function applyStageClasses() {
            const fogs = document.querySelectorAll('.finger-fog');
            fogs.forEach(fog => {
                if (fog.id !== winnerId && !fog.classList.contains('dispersing')) {
                    fog.className = `finger-fog stage-${currentStage}`;
                }
            });
            // Delikatne tętno podczas zbierania graczy
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function drawWinner() {
            const ids = Object.keys(activeTouches);
            if (ids.length < 2) return;

            isFinished = true;
            const randomIndex = Math.floor(Math.random() * ids.length);
            winnerId = ids[randomIndex];

            const fogs = document.querySelectorAll('.finger-fog');
            fogs.forEach(fog => {
                if (fog.id !== winnerId) {
                    if (!fog.classList.contains('dispersing')) {
                        fog.className = 'finger-fog dispersing';
                        // Wydłużone sprzątanie przegranych (2000ms)
                        setTimeout(() => fog.remove(), 2000);
                    }
                } else {
                    fog.className = 'finger-fog winner';
                    // Pojedyncza, długa, mistyczna wibracja (jak spokojne westchnięcie)
                    if (navigator.vibrate) navigator.vibrate([300]);
                }
            });
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (isFinished) return;

            let anyNewFinger = false;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (!activeTouches[touch.identifier]) {
                    const chosenColor = colorsRGB[Math.abs(touch.identifier) % colorsRGB.length];
                    const pos = getRelativePos(touch.clientX, touch.clientY);
                    
                    activeTouches[touch.identifier] = {
                        x: pos.x,
                        y: pos.y,
                        colorRGB: chosenColor
                    };
                    anyNewFinger = true;
                }
            }
            
            render();

            if (Object.keys(activeTouches).length >= 2 && anyNewFinger) {
                startCountdown();
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (isFinished) return;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (activeTouches[touch.identifier]) {
                    const pos = getRelativePos(touch.clientX, touch.clientY);
                    activeTouches[touch.identifier].x = pos.x;
                    activeTouches[touch.identifier].y = pos.y;
                }
            }
            render();
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                delete activeTouches[touch.identifier];
            }

            const remainingCount = Object.keys(activeTouches).length;

            if (remainingCount === 0) {
                isFinished = false;
                winnerId = null;
                activeTouches = {};
                stopCountdown();
            } else if (remainingCount < 2 && !isFinished) {
                stopCountdown();
            }

            render();
        }

        document.addEventListener('touchstart', handleTouchStart, { passive: false });
        document.addEventListener('touchmove', handleTouchMove, { passive: false });
        document.addEventListener('touchend', handleTouchEnd, { passive: false });
        document.addEventListener('touchcancel', handleTouchEnd, { passive: false });
    </script>
</body>
</html>
