<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Losowanie Gracza</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            /* Wyłącza podświetlenie przy tapnięciu na iOS */
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html {
            width: 100vw;
            height: 100vh;
            /* Kluczowe dla usunięcia białych pasków na iOS: */
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            overscroll-behavior: none;
            background-color: #000000;
            touch-action: none;
        }

        /* Ambientowe rozbłyski w tle */
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px); /* Bardzo mocne rozmycie */
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            animation: float 12s infinite alternate ease-in-out;
        }

        .glow-1 { top: -10vw; left: -10vw; width: 60vw; height: 60vw; background: #FF007F; animation-delay: 0s; }
        .glow-2 { bottom: -15vw; right: -10vw; width: 70vw; height: 70vw; background: #00FFF0; animation-delay: -4s; }
        .glow-3 { top: 30vh; left: 60vw; width: 50vw; height: 50vw; background: #7B2CBF; animation-delay: -8s; }

        @keyframes float {
            0% { transform: scale(1) translate(0, 0); opacity: 0.15; }
            50% { transform: scale(1.2) translate(5vw, 5vh); opacity: 0.25; }
            100% { transform: scale(0.9) translate(-5vw, -5vh); opacity: 0.1; }
        }

        /* Mgła pod palcami graczy */
        .finger-fog {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            pointer-events: none;
            /* Gradient tworzący efekt mgły/neonu */
            background: radial-gradient(circle, rgba(var(--glow-rgb), 0.7) 0%, rgba(var(--glow-rgb), 0.2) 30%, transparent 70%);
            mix-blend-mode: screen; /* Pięknie miesza kolory gdy palce są blisko siebie */
            transform: translate(-50%, -50%) scale(0);
            transition: opacity 0.3s ease, transform 0.4s ease-out;
            z-index: 10;
        }

        /* Faza spoczynku - czekanie na resztę graczy */
        .finger-fog.idle {
            transform: translate(-50%, -50%) scale(0.6);
            opacity: 0.6;
            animation: breathe 2s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(0.7); opacity: 0.8; }
        }

        /* Fazy odliczania - coraz szybsze i większe pulsowanie */
        .finger-fog.stage-1 {
            animation: pulse-s1 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes pulse-s1 {
            0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.9; }
        }

        .finger-fog.stage-2 {
            animation: pulse-s2 0.5s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes pulse-s2 {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .finger-fog.stage-3 {
            animation: pulse-s3 0.25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes pulse-s3 {
            0% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; filter: brightness(1); }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; filter: brightness(1.5); }
        }

        /* Efekt Zwycięzcy */
        .finger-fog.winner {
            /* Gigantyczna mgła rozświetlająca ekran */
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(var(--glow-rgb), 0.8) 20%, rgba(var(--glow-rgb), 0.3) 50%, transparent 80%);
            transform: translate(-50%, -50%) scale(3) !important;
            opacity: 1;
            animation: winner-glow 0.8s ease-in-out infinite alternate;
            z-index: 100;
        }

        @keyframes winner-glow {
            0% { transform: translate(-50%, -50%) scale(2.8); filter: brightness(1.2); }
            100% { transform: translate(-50%, -50%) scale(3.5); filter: brightness(1.8); }
        }
    </style>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="ambient-glow glow-3"></div>

    <div id="game-canvas" style="position: absolute; width: 100%; height: 100%; z-index: 5;"></div>

    <script>
        const canvas = document.getElementById('game-canvas');
        
        let activeTouches = {};
        let countdownTimer = null;
        let isFinished = false;
        let winnerId = null;
        let currentStage = 0;

        // Kolory zapisane jako wartości RGB dla łatwego użycia w przezroczystościach
        const colorsRGB = [
            '0, 255, 240',   // Cyan
            '255, 0, 127',   // Neon Pink
            '123, 44, 191',  // Purple
            '57, 255, 20',   // Neon Green
            '255, 107, 0',   // Neon Orange
            '255, 215, 0',   // Gold
            '0, 229, 255'    // Electric Blue
        ];

        function render() {
            // Sprzątanie po zabranych palcach
            const existingFogs = document.querySelectorAll('.finger-fog');
            existingFogs.forEach(fog => {
                if (!activeTouches[fog.id] && fog.id !== winnerId) {
                    fog.style.opacity = '0';
                    fog.style.transform = 'translate(-50%, -50%) scale(0)';
                    setTimeout(() => fog.remove(), 300);
                }
            });

            if (isFinished) return;

            // Tworzenie lub pozycjonowanie mgły
            Object.keys(activeTouches).forEach(id => {
                let fog = document.getElementById(id);
                if (!fog) {
                    fog = document.createElement('div');
                    fog.className = 'finger-fog idle';
                    fog.id = id;
                    fog.style.setProperty('--glow-rgb', activeTouches[id].colorRGB);
                    canvas.appendChild(fog);
                }
                // Ustawienie podążania mgły za palcem
                fog.style.left = activeTouches[id].x + 'px';
                fog.style.top = activeTouches[id].y + 'px';
            });
        }

        function startCountdown() {
            stopCountdown();
            currentStage = 1;
            applyStageClasses();
            
            countdownTimer = setInterval(() => {
                currentStage++;
                if (currentStage <= 3) {
                    applyStageClasses();
                } else {
                    stopCountdown();
                    drawWinner();
                }
            }, 1000);
        }

        function stopCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            currentStage = 0;
            // Powrót do fazy idle, jeśli odliczanie przerwano
            if (!isFinished) {
                const fogs = document.querySelectorAll('.finger-fog');
                fogs.forEach(fog => {
                    fog.className = 'finger-fog idle';
                });
            }
        }

        function applyStageClasses() {
            const fogs = document.querySelectorAll('.finger-fog');
            fogs.forEach(fog => {
                if (fog.id !== winnerId) {
                    fog.className = `finger-fog stage-${currentStage}`;
                }
            });
            // Delikatna wibracja przy każdej zmianie fazy (jak bicie serca)
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function drawWinner() {
            const ids = Object.keys(activeTouches);
            if (ids.length < 2) return;

            isFinished = true;
            const randomIndex = Math.floor(Math.random() * ids.length);
            winnerId = ids[randomIndex];

            const fogs = document.querySelectorAll('.finger-fog');
            fogs.forEach(fog => {
                if (fog.id !== winnerId) {
                    fog.style.opacity = '0';
                    fog.style.transform = 'translate(-50%, -50%) scale(0)';
                    setTimeout(() => fog.remove(), 300);
                } else {
                    fog.className = 'finger-fog winner';
                    // Mocniejsza wibracja dla zwycięzcy
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            });
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (isFinished) return;

            let anyNewFinger = false;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (!activeTouches[touch.identifier]) {
                    const chosenColor = colorsRGB[Math.abs(touch.identifier) % colorsRGB.length];
                    activeTouches[touch.identifier] = {
                        x: touch.clientX,
                        y: touch.clientY,
                        colorRGB: chosenColor
                    };
                    anyNewFinger = true;
                }
            }
            
            render();

            if (Object.keys(activeTouches).length >= 2 && anyNewFinger) {
                startCountdown();
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (isFinished) return;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (activeTouches[touch.identifier]) {
                    activeTouches[touch.identifier].x = touch.clientX;
                    activeTouches[touch.identifier].y = touch.clientY;
                }
            }
            render();
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                delete activeTouches[touch.identifier];
            }

            const remainingCount = Object.keys(activeTouches).length;

            if (remainingCount === 0) {
                // Twardy reset gry po zabraniu wszystkich palców
                isFinished = false;
                winnerId = null;
                activeTouches = {};
                stopCountdown();
            } else if (remainingCount < 2 && !isFinished) {
                // Przerwanie odliczania, jeśli zostało za mało graczy, a losowanie trwało
                stopCountdown();
            }

            render();
        }

        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
    </script>
</body>
</html>
